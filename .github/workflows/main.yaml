name: Cloud Run Traffic Split PoC

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: 'read'
  id-token: 'write'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
  WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
  REGION: us-central1
  REPO_NAME: lab-run-traffic-management
  SERVICE_NAME: python-traffic-poc

jobs:
  # ---------------------------------------------------------
  # JOB 1: PREVIEW (Roda quando abrir ou atualizar um PR)
  # ---------------------------------------------------------
  deploy_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Preview Image
        run: |
          IMAGE_TAG="pr-${{ github.event.pull_request.number }}"
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/app:${IMAGE_TAG}"
          
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL
          
          # Passa as variáveis para o próximo passo
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
          echo "TAG_NAME=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy Preview to Cloud Run (No Traffic)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_URL }} \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --no-traffic \
            --tag ${{ env.TAG_NAME }} \
            --set-env-vars APP_VERSION=${{ env.TAG_NAME }} \
            --quiet

  # ---------------------------------------------------------
  # JOB 2: PRODUÇÃO (Roda quando criar uma Tag vX.Y.Z)
  # ---------------------------------------------------------
  deploy_prod:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Prod Image
        run: |
          # Remove o "v" da tag (ex: v1.0.0 vira 1.0.0)
          VERSION=$(echo $GITHUB_REF_NAME | sed 's/v//')
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/app:${VERSION}"
          
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL
          
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Deploy Production to Cloud Run (100% Traffic)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_URL }} \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --set-env-vars APP_VERSION=${{ env.VERSION }} \
            --traffic laterst=100 \
            --quiet